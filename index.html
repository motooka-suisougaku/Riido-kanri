<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎺 リード在庫管理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2c3e50;
            --accent: #e74c3c;
            --accent-light: #f39c12;
            --success: #27ae60;
            --bg: #ecf0f1;
            --card: #ffffff;
            --text: #2c3e50;
            --text-light: #7f8c8d;
            --border: #bdc3c7;
        }

        html, body {
            height: 100%;
            width: 100%;
        }

        body {
            font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: var(--text);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            margin: 16px;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
        }

        .screen {
            display: none;
            animation: fadeIn 0.4s ease;
            flex: 1;
            overflow-y: auto;
        }

        .screen.active {
            display: flex;
            flex-direction: column;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            background: linear-gradient(135deg, var(--primary), #34495e);
            color: white;
            padding: 24px;
            text-align: center;
            flex-shrink: 0;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 4px;
            font-weight: 700;
        }

        .header .subtitle {
            font-size: 14px;
            opacity: 0.9;
        }

        .content {
            padding: 32px 24px;
            overflow-y: auto;
            flex: 1;
        }

        button {
            font-family: inherit;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            padding: 12px 24px;
        }

        .btn {
            background: var(--accent);
            color: white;
            width: 100%;
            margin-bottom: 12px;
        }

        .btn:active, .btn:hover {
            background: #c0392b;
            transform: scale(0.98);
        }

        .btn-secondary {
            background: var(--primary);
            color: white;
        }

        .btn-secondary:active, .btn-secondary:hover {
            background: #1a252f;
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-success:active, .btn-success:hover {
            background: #229954;
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
            padding: 6px 12px;
            font-size: 12px;
            margin-left: 8px;
        }

        .btn-danger:hover {
            background: #c0392b;
        }

        .btn-warning {
            background: #ff9800;
            color: white;
            padding: 8px 16px;
            font-size: 13px;
            width: auto;
            margin-top: 12px;
        }

        .btn-warning:hover {
            background: #e68900;
        }

        .btn-small {
            padding: 8px 16px;
            font-size: 14px;
            width: auto;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text);
        }

        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 16px;
            font-family: inherit;
            transition: border-color 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(231, 76, 60, 0.1);
        }

        .code-input {
            font-size: 24px;
            letter-spacing: 8px;
            text-align: center;
            font-weight: bold;
            text-transform: uppercase;
        }

        .code-hint {
            text-align: center;
            font-size: 12px;
            color: var(--text-light);
            margin-top: 8px;
        }

        .instrument-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .instrument-btn {
            padding: 20px;
            font-size: 18px;
            background: var(--bg);
            color: var(--text);
            border: 3px solid var(--border);
            border-radius: 12px;
            font-weight: 700;
            transition: all 0.3s ease;
        }

        .instrument-btn:hover, .instrument-btn:active {
            border-color: var(--accent);
            background: #fff9f5;
            transform: scale(1.05);
        }

        .quantity-control {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 24px;
            margin: 40px 0;
        }

        .qty-btn {
            width: 80px;
            height: 80px;
            font-size: 48px;
            border-radius: 16px;
            background: var(--accent);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(231, 76, 60, 0.3);
        }

        .qty-btn:active {
            transform: scale(0.95);
        }

        .qty-display {
            text-align: center;
        }

        .qty-number {
            font-size: 64px;
            font-weight: 900;
            color: var(--accent);
            line-height: 1;
        }

        .qty-label {
            font-size: 14px;
            color: var(--text-light);
            margin-top: 8px;
        }

        .welcome-message {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 24px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 24px;
        }

        .welcome-message h2 {
            font-size: 20px;
            margin-bottom: 8px;
        }

        .welcome-message p {
            font-size: 14px;
            opacity: 0.95;
        }

        .reed-card {
            background: var(--primary);
            color: white;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 16px;
        }

        .reed-card-title {
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .reed-card-info {
            font-size: 13px;
            opacity: 0.9;
            margin-bottom: 16px;
        }

        .member-card {
            background: var(--bg);
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 12px;
            border-left: 4px solid var(--accent);
        }

        .member-name {
            font-weight: 700;
            font-size: 16px;
            color: var(--text);
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .member-last-update {
            font-size: 12px;
            color: var(--text-light);
            margin-bottom: 8px;
        }

        .reed-stock-item {
            background: white;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 8px;
            border-left: 3px solid var(--success);
        }

        .reed-stock-name {
            font-weight: 600;
            color: var(--text);
            font-size: 14px;
            margin-bottom: 4px;
        }

        .reed-stock-qty {
            font-size: 13px;
            color: var(--text-light);
        }

        .pending-item {
            background: #fff3cd;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 8px;
            border-left: 3px solid #ff9800;
        }

        .pending-name {
            font-weight: 600;
            color: #856404;
            font-size: 14px;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4);
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 32px;
            border-radius: 16px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-content h2 {
            font-size: 28px;
            margin-bottom: 12px;
            color: var(--success);
        }

        .modal-content p {
            font-size: 16px;
            color: var(--text-light);
            margin-bottom: 20px;
        }

        .back-button {
            background: var(--text-light);
            color: white;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .back-button:hover, .back-button:active {
            background: var(--text);
        }

        @media (max-width: 600px) {
            .container {
                border-radius: 0;
                margin: 0;
                max-height: 100vh;
            }

            .content {
                padding: 24px 16px;
            }

            .header h1 {
                font-size: 24px;
            }

            .instrument-buttons {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Screen 1: セキュリティコード -->
        <div id="screen-security" class="screen active">
            <div class="header">
                <h1>🎺 リード在庫管理</h1>
                <p class="subtitle">吹奏楽部</p>
            </div>
            <div class="content">
                <div class="form-group">
                    <label>セキュリティコードを入力</label>
                    <input type="text" id="securityCode" class="code-input" placeholder="例: ONGAKUDO" maxlength="10">
                    <p class="code-hint">学校から指定されたコードを入力してください</p>
                </div>
                <button class="btn" onclick="verifySecurity()">進む</button>
            </div>
        </div>

        <!-- Screen 2: 楽器選択 -->
        <div id="screen-instrument" class="screen">
            <div class="header">
                <h1>🎺 楽器を選択</h1>
                <p class="subtitle">あなたの楽器は？</p>
            </div>
            <div class="content">
                <div class="instrument-buttons">
                    <button class="instrument-btn" onclick="selectInstrument('Saxophone')">🎷 サックス</button>
                    <button class="instrument-btn" onclick="selectInstrument('Clarinet')">🎺 クラリネット</button>
                </div>
            </div>
        </div>

        <!-- Screen 3: ログイン・新規登録 -->
        <div id="screen-register-or-login" class="screen">
            <div class="header">
                <h1>ログイン</h1>
                <p class="subtitle" id="registerOrLoginSubtitle"></p>
            </div>
            <div class="content">
                <button class="back-button" onclick="showScreen('instrument')">＜ 戻る</button>

                <div id="login-section">
                    <div class="form-group">
                        <label>あなたの名前を選択</label>
                        <select id="memberSelect">
                            <option value="">-- 選択してください --</option>
                        </select>
                    </div>
                    <button class="btn" onclick="loginMember()">ログイン</button>
                    <p style="text-align: center; margin-top: 16px; color: var(--text-light); font-size: 13px;">
                        初めての方は下へ ↓
                    </p>
                </div>

                <button class="btn-secondary btn-small" onclick="toggleRegisterForm()" style="width: 100%; margin-top: 16px;">
                    新規登録 →
                </button>

                <div id="register-section" style="display: none; margin-top: 20px; padding-top: 20px; border-top: 2px solid var(--border);">
                    <div class="form-group">
                        <label>新しい名前を入力</label>
                        <input type="text" id="newMemberName" placeholder="例: 田中太郎">
                    </div>
                    <button class="btn-success" onclick="registerNewMember()">新規登録</button>
                    <button class="btn-secondary btn-small" onclick="toggleRegisterForm()" style="width: 100%; margin-top: 12px;">
                        ← ログイン画面に戻る
                    </button>
                </div>
            </div>
        </div>

        <!-- Screen 4: リード追加 -->
        <div id="screen-add-reed" class="screen">
            <div class="header">
                <h1>🎵 リードを追加</h1>
                <p class="subtitle">新しいリード銘柄を登録</p>
            </div>
            <div class="content">
                <button class="back-button" onclick="showScreen('dashboard')">＜ ダッシュボードへ</button>

                <div class="form-group">
                    <label>リード銘柄名</label>
                    <input type="text" id="reedName" placeholder="例: YAMAHA 2.5">
                </div>

                <div class="form-group">
                    <label>1箱の入数（本数）</label>
                    <input type="number" id="reedBoxCount" placeholder="例: 10" min="1">
                </div>

                <button class="btn-success" onclick="addNewReed()">リードを追加</button>
            </div>
        </div>

        <!-- Screen 5: ダッシュボード（部員用） -->
        <div id="screen-dashboard" class="screen">
            <div class="header">
                <h1 id="dashboardName">ようこそ</h1>
                <p class="subtitle">リード在庫管理</p>
            </div>
            <div class="content">
                <div class="welcome-message">
                    <h2>あなたのリード在庫を更新</h2>
                    <p>保有箱数を入力してください</p>
                </div>

                <button class="btn-secondary btn-small" onclick="showScreen('add-reed')" style="width: 100%; margin-bottom: 16px;">
                    + 新しいリード銘柄を追加
                </button>

                <div id="reedsList"></div>

                <button class="btn" onclick="logout()" style="margin-top: 24px;">ログアウト</button>
                <button class="btn-secondary btn-small" onclick="showScreen('admin')" style="width: 100%; margin-bottom: 12px;">
                    👥 全員の在庫確認
                </button>
                <button class="btn-warning" onclick="showDeleteAccountModal()">
                    🗑️ アカウント削除
                </button>
            </div>
        </div>

        <!-- Screen 6: 管理画面 -->
        <div id="screen-admin" class="screen">
            <div class="header">
                <h1>👥 全員の在庫確認</h1>
                <p class="subtitle" id="adminSubtitle">リード在庫状況</p>
            </div>
            <div class="content">
                <button class="back-button" onclick="showScreen('dashboard')">＜ ダッシュボードへ</button>

                <div style="display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap;">
                    <button class="btn-secondary btn-small" style="flex: 1; background: var(--accent); color: white;" id="tab-all" onclick="switchAdminTab('all')">
                        📊 全員の在庫
                    </button>
                    <button class="btn-secondary btn-small" style="flex: 1;" id="tab-pending" onclick="switchAdminTab('pending')">
                        📋 未入力者
                    </button>
                    <button class="btn-secondary btn-small" style="flex: 1;" id="tab-excel" onclick="exportToExcel()">
                        📥 Excel出力
                    </button>
                </div>

                <div id="admin-all-tab"></div>
                <div id="admin-pending-tab" style="display: none;"></div>
            </div>
        </div>

        <!-- 送信完了モーダル -->
        <div id="successModal" class="modal">
            <div class="modal-content">
                <h2>✓ 完了！</h2>
                <p id="successMessage">入力が保存されました</p>
                <button class="btn-secondary" onclick="closeModal()">ダッシュボードに戻る</button>
            </div>
        </div>

        <!-- アカウント削除確認モーダル -->
        <div id="deleteAccountModal" class="modal">
            <div class="modal-content">
                <h2>⚠️ アカウント削除</h2>
                <p>本当にアカウントを削除しますか？<br>この操作は取り消せません。</p>
                <button class="btn-secondary" onclick="closeDeleteAccountModal()" style="margin-bottom: 12px;">キャンセル</button>
                <button class="btn-danger" onclick="confirmDeleteAccount()" style="width: 100%;">削除確定</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK (compat版) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA2mI7Cv1gIbUKwfuFKQkDj_QVx6WmiZfU",
            authDomain: "riidokanri.firebaseapp.com",
            projectId: "riidokanri",
            storageBucket: "riidokanri.firebasestorage.app",
            messagingSenderId: "437505590526",
            appId: "1:437505590526:web:463ca03512bdca988a11af"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // ========================================
        // グローバル変数
        // ========================================
        let currentScreen = 'security';
        let securityCode = 'ONGAKUDO';
        let selectedInstrument = null;
        let currentMemberId = null;
        let currentMemberName = null;
        let currentReeds = {};
        let allMembers = [];
        let allReeds = {};

        console.log('✅ アプリ初期化完了');
        console.log('セキュリティコード:', securityCode);

        // ========================================
        // スクリーン管理
        // ========================================
        function showScreen(screenName) {
            console.log('📱 画面切り替え:', screenName);
            
            document.querySelectorAll('.screen').forEach(s => {
                s.classList.remove('active');
            });
            
            const screenElement = document.getElementById(`screen-${screenName}`);
            if (screenElement) {
                screenElement.classList.add('active');
                console.log('✅ 画面表示:', `screen-${screenName}`);
            } else {
                console.error('❌ 画面が見つかりません:', `screen-${screenName}`);
                return;
            }
            
            currentScreen = screenName;

            if (screenName === 'register-or-login') {
                loadMembers();
            } else if (screenName === 'dashboard') {
                loadDashboard();
            } else if (screenName === 'admin') {
                loadAdmin();
            }
        }

        // ========================================
        // Screen 1: セキュリティコード
        // ========================================
        function verifySecurity() {
            console.log('🔐 セキュリティコード検証開始');
            
            const inputElement = document.getElementById('securityCode');
            const code = inputElement.value.trim().toUpperCase();
            
            console.log('入力値:', code);
            console.log('正しいコード:', securityCode);
            
            if (!code) {
                console.warn('⚠️ コード入力なし');
                alert('コードを入力してください');
                return;
            }

            if (code === securityCode) {
                console.log('✅ 認証成功');
                showScreen('instrument');
            } else {
                console.error('❌ 認証失敗');
                alert(`コードが正しくありません\n正しいコード: ${securityCode}`);
            }
        }

        // ========================================
        // Screen 2: 楽器選択
        // ========================================
        function selectInstrument(instrument) {
            selectedInstrument = instrument;
            document.getElementById('registerOrLoginSubtitle').textContent = 
                `あなたの楽器: ${getInstrumentName(instrument)}`;
            showScreen('register-or-login');
        }

        function getInstrumentName(instrument) {
            const names = {
                'Saxophone': 'サックス',
                'Clarinet': 'クラリネット'
            };
            return names[instrument] || instrument;
        }

        // ========================================
        // Screen 3: ログイン・新規登録
        // ========================================
        async function loadMembers() {
            try {
                const snapshot = await db.collection('members')
                    .where('instrument', '==', selectedInstrument)
                    .get();

                const select = document.getElementById('memberSelect');
                select.innerHTML = '<option value="">-- 選択してください --</option>';

                allMembers = [];
                snapshot.forEach(doc => {
                    allMembers.push({ id: doc.id, ...doc.data() });
                    const option = document.createElement('option');
                    option.value = doc.id;
                    option.textContent = doc.data().name;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error('❌ エラー:', error);
                alert('データ取得に失敗しました\n' + error.message);
            }
        }

        function loginMember() {
            const select = document.getElementById('memberSelect');
            const memberId = select.value;

            if (!memberId) {
                alert('名前を選択してください');
                return;
            }

            currentMemberId = memberId;
            const member = allMembers.find(m => m.id === memberId);
            currentMemberName = member.name;

            showScreen('dashboard');
        }

        function toggleRegisterForm() {
            const loginSection = document.getElementById('login-section');
            const registerSection = document.getElementById('register-section');

            loginSection.style.display = loginSection.style.display === 'none' ? 'block' : 'none';
            registerSection.style.display = registerSection.style.display === 'none' ? 'block' : 'none';
        }

        async function registerNewMember() {
            const nameInput = document.getElementById('newMemberName');
            const name = nameInput.value.trim();
            
            if (!name) {
                alert('名前を入力してください');
                return;
            }

            try {
                const docRef = await db.collection('members').add({
                    name: name,
                    instrument: selectedInstrument,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                currentMemberId = docRef.id;
                currentMemberName = name;
                nameInput.value = '';

                await loadMembers();
                showScreen('dashboard');
            } catch (error) {
                console.error('❌ エラー:', error);
                alert('登録に失敗しました\n' + error.message);
            }
        }

        // ========================================
        // Screen 4: リード追加
        // ========================================
        async function addNewReed() {
            const reedName = document.getElementById('reedName').value.trim();
            const boxCount = parseInt(document.getElementById('reedBoxCount').value);

            if (!reedName || !boxCount || boxCount < 1) {
                alert('すべてのフィールドを入力してください');
                return;
            }

            try {
                // 個人のリード在庫に追加
                await db.collection('member_stocks').add({
                    memberId: currentMemberId,
                    reedId: null,
                    reedName: reedName,
                    boxCount: boxCount,
                    boxes: 0,
                    memberName: currentMemberName,
                    instrument: selectedInstrument,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                    isCustomReed: true
                });

                document.getElementById('reedName').value = '';
                document.getElementById('reedBoxCount').value = '';

                showSuccessModal(`「${reedName}」を追加しました！`);
                setTimeout(() => {
                    loadDashboard();
                }, 1500);
            } catch (error) {
                console.error('❌ エラー:', error);
                alert('追加に失敗しました\n' + error.message);
            }
        }

        async function deleteReed(reedId) {
            if (confirm('このリード銘柄を削除しますか？')) {
                try {
                    await db.collection('reeds').doc(reedId).delete();
                    loadDashboard();
                } catch (error) {
                    console.error('❌ 削除エラー:', error);
                    alert('削除に失敗しました');
                }
            }
        }

        // ========================================
        // Screen 5: ダッシュボード
        // ========================================
        async function loadDashboard() {
            document.getElementById('dashboardName').textContent = 
                `${currentMemberName}さん、おはよう！`;

            try {
                // グローバルリードを読み込む
                const reedsSnapshot = await db.collection('reeds')
                    .where('instrument', '==', selectedInstrument)
                    .get();

                currentReeds = {};
                allReeds = {};

                reedsSnapshot.forEach(doc => {
                    allReeds[doc.id] = { id: doc.id, ...doc.data() };
                });

                // このメンバーの在庫を読み込む
                const stockSnapshot = await db.collection('member_stocks')
                    .where('memberId', '==', currentMemberId)
                    .get();

                const customReeds = {};
                
                stockSnapshot.forEach(doc => {
                    const data = doc.data();
                    if (data.isCustomReed) {
                        // カスタムリード
                        customReeds[data.createdAt ? data.createdAt.seconds : Date.now()] = {
                            reedName: data.reedName,
                            boxCount: data.boxCount,
                            boxes: data.boxes || 0,
                            isCustom: true
                        };
                    } else if (data.reedId) {
                        // グローバルリード
                        currentReeds[data.reedId] = {
                            boxes: data.boxes || 0
                        };
                    }
                });

                allReeds.customReeds = customReeds;
                renderReedsList();
            } catch (error) {
                console.error('❌ エラー:', error);
            }
        }

        function renderReedsList() {
            const container = document.getElementById('reedsList');
            
            const hasGlobalReeds = Object.keys(allReeds).length > 1 || (Object.keys(allReeds).length === 1 && !allReeds.customReeds);
            const customReeds = allReeds.customReeds || {};
            
            if (!hasGlobalReeds && Object.keys(customReeds).length === 0) {
                container.innerHTML = `
                    <div style="text-align: center; padding: 32px 0; color: var(--text-light);">
                        <p style="font-size: 14px;">まだリードが登録されていません</p>
                        <p style="font-size: 12px; margin-top: 8px;">「新しいリード銘柄を追加」から追加してください</p>
                    </div>
                `;
                return;
            }

            let html = '';

            // グローバルリードを表示
            Object.entries(allReeds).forEach(([reedId, reed]) => {
                if (reedId === 'customReeds') return; // カスタムリードはスキップ
                
                const stock = currentReeds[reedId] || { boxes: 0 };
                const boxes = stock.boxes;

                html += `
                    <div class="reed-card">
                        <div class="reed-card-title">
                            <span>${reed.name}</span>
                            <button class="btn-danger" onclick="deleteReed('${reedId}')">削除</button>
                        </div>
                        <div class="reed-card-info">
                            1箱: ${reed.boxCount}本入り
                        </div>

                        <div style="background: rgba(255,255,255,0.2); padding: 12px; border-radius: 6px;">
                            <label style="font-size: 16px; color: rgba(255,255,255,0.95); font-weight: 700;">保有箱数</label>
                            <div class="quantity-control" style="gap: 16px; margin: 16px 0;">
                                <button class="qty-btn" onclick="decreaseBoxes('${reedId}')" style="width: 60px; height: 60px; font-size: 36px;">−</button>
                                <div class="qty-display">
                                    <div class="qty-number" style="color: white;">${boxes}</div>
                                    <div class="qty-label" style="color: rgba(255,255,255,0.8);">箱</div>
                                </div>
                                <button class="qty-btn" onclick="increaseBoxes('${reedId}')" style="width: 60px; height: 60px; font-size: 36px;">+</button>
                            </div>
                        </div>
                    </div>
                `;
            });

            // カスタムリードを表示
            Object.entries(customReeds).forEach(([timestamp, customReed]) => {
                const boxes = customReed.boxes || 0;
                const customId = `custom-${timestamp}`;

                html += `
                    <div class="reed-card" style="border: 2px dashed rgba(255,255,255,0.5);">
                        <div class="reed-card-title">
                            <span>✏️ ${customReed.reedName}</span>
                            <button class="btn-danger" onclick="deleteCustomReed('${timestamp}')">削除</button>
                        </div>
                        <div class="reed-card-info">
                            1箱: ${customReed.boxCount}本入り
                        </div>

                        <div style="background: rgba(255,255,255,0.2); padding: 12px; border-radius: 6px;">
                            <label style="font-size: 16px; color: rgba(255,255,255,0.95); font-weight: 700;">保有箱数</label>
                            <div class="quantity-control" style="gap: 16px; margin: 16px 0;">
                                <button class="qty-btn" onclick="decreaseCustomBoxes('${timestamp}')" style="width: 60px; height: 60px; font-size: 36px;">−</button>
                                <div class="qty-display">
                                    <div class="qty-number" style="color: white;">${boxes}</div>
                                    <div class="qty-label" style="color: rgba(255,255,255,0.8);">箱</div>
                                </div>
                                <button class="qty-btn" onclick="increaseCustomBoxes('${timestamp}')" style="width: 60px; height: 60px; font-size: 36px;">+</button>
                            </div>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;

            container.innerHTML += `
                <button class="btn-success" onclick="saveReeds()" style="margin-top: 20px; font-size: 18px; padding: 16px;">
                    📝 これで完了！送信
                </button>
            `;
        }

        function increaseBoxes(reedId) {
            if (!currentReeds[reedId]) {
                currentReeds[reedId] = { boxes: 0 };
            }
            currentReeds[reedId].boxes++;
            renderReedsList();
        }

        function decreaseBoxes(reedId) {
            if (!currentReeds[reedId]) {
                currentReeds[reedId] = { boxes: 0 };
            }
            if (currentReeds[reedId].boxes > 0) {
                currentReeds[reedId].boxes--;
            }
            renderReedsList();
        }

        function increaseCustomBoxes(timestamp) {
            if (!allReeds.customReeds) {
                allReeds.customReeds = {};
            }
            if (!allReeds.customReeds[timestamp]) {
                allReeds.customReeds[timestamp] = { boxes: 0 };
            }
            allReeds.customReeds[timestamp].boxes++;
            renderReedsList();
        }

        function decreaseCustomBoxes(timestamp) {
            if (!allReeds.customReeds) {
                allReeds.customReeds = {};
            }
            if (!allReeds.customReeds[timestamp]) {
                allReeds.customReeds[timestamp] = { boxes: 0 };
            }
            if (allReeds.customReeds[timestamp].boxes > 0) {
                allReeds.customReeds[timestamp].boxes--;
            }
            renderReedsList();
        }

        async function deleteCustomReed(timestamp) {
            if (confirm('このリード銘柄を削除しますか？')) {
                try {
                    const stockDocs = await db.collection('member_stocks')
                        .where('memberId', '==', currentMemberId)
                        .where('isCustomReed', '==', true)
                        .get();

                    for (let doc of stockDocs.docs) {
                        if (doc.data().createdAt && doc.data().createdAt.seconds === parseInt(timestamp)) {
                            await db.collection('member_stocks').doc(doc.id).delete();
                            break;
                        }
                    }

                    if (allReeds.customReeds && allReeds.customReeds[timestamp]) {
                        delete allReeds.customReeds[timestamp];
                    }
                    renderReedsList();
                } catch (error) {
                    console.error('❌ 削除エラー:', error);
                    alert('削除に失敗しました');
                }
            }
        }

        async function saveReeds() {
            try {
                const batch = db.batch();

                // 既存のグローバルリード在庫を削除
                const existingGlobalDocs = await db.collection('member_stocks')
                    .where('memberId', '==', currentMemberId)
                    .where('isCustomReed', '==', false)
                    .get();

                existingGlobalDocs.forEach(doc => {
                    batch.delete(doc.ref);
                });

                // グローバルリードの新しいデータを保存
                Object.entries(currentReeds).forEach(([reedId, stock]) => {
                    if (stock.boxes > 0) {
                        const newDocRef = db.collection('member_stocks').doc();
                        batch.set(newDocRef, {
                            memberId: currentMemberId,
                            reedId: reedId,
                            boxes: stock.boxes || 0,
                            memberName: currentMemberName,
                            instrument: selectedInstrument,
                            isCustomReed: false,
                            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                        });
                    }
                });

                // カスタムリードの箱数を更新
                const customReeds = allReeds.customReeds || {};
                const customStocks = await db.collection('member_stocks')
                    .where('memberId', '==', currentMemberId)
                    .where('isCustomReed', '==', true)
                    .get();

                const customStockMap = {};
                customStocks.forEach(doc => {
                    customStockMap[doc.data().createdAt ? doc.data().createdAt.seconds : 0] = doc.id;
                });

                Object.entries(customReeds).forEach(([timestamp, customReed]) => {
                    const docId = customStockMap[timestamp];
                    if (docId) {
                        const docRef = db.collection('member_stocks').doc(docId);
                        batch.update(docRef, {
                            boxes: customReed.boxes || 0,
                            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                        });
                    }
                });

                await batch.commit();

                console.log('✅ 保存完了');
                showSuccessModal('お疲れ様でした！\nデータが保存されました');
                setTimeout(() => {
                    loadDashboard();
                }, 1500);
            } catch (error) {
                console.error('❌ エラー:', error);
                alert('保存に失敗しました\n' + error.message);
            }
        }

        // ========================================
        // Screen 6: 管理画面
        // ========================================
        async function loadAdmin() {
            document.getElementById('adminSubtitle').textContent = 
                `${getInstrumentName(selectedInstrument)}`;
            
            try {
                const membersSnapshot = await db.collection('members')
                    .where('instrument', '==', selectedInstrument)
                    .get();

                const membersData = {};
                membersSnapshot.forEach(doc => {
                    membersData[doc.id] = doc.data().name;
                });

                const stockSnapshot = await db.collection('member_stocks')
                    .where('instrument', '==', selectedInstrument)
                    .get();

                const stocks = {};
                const lastUpdates = {};
                
                stockSnapshot.forEach(doc => {
                    const data = doc.data();
                    if (!stocks[data.memberId]) {
                        stocks[data.memberId] = {};
                    }
                    stocks[data.memberId][data.reedId] = {
                        boxes: data.boxes || 0
                    };
                    
                    if (data.updatedAt) {
                        lastUpdates[data.memberId] = data.updatedAt.toDate();
                    }
                });

                renderAllTab(membersData, stocks, lastUpdates);
                renderPendingTab(membersData, stocks);
            } catch (error) {
                console.error('❌ エラー:', error);
            }
        }

        function renderAllTab(membersData, stocks, lastUpdates) {
            const container = document.getElementById('admin-all-tab');
            let html = '';

            Object.entries(membersData).forEach(([memberId, memberName]) => {
                const memberStocks = stocks[memberId] || {};
                const lastUpdate = lastUpdates[memberId];
                const lastUpdateStr = lastUpdate ? lastUpdate.toLocaleDateString('ja-JP') : '未入力';

                html += `
                    <div class="member-card">
                        <div class="member-name">👤 ${memberName}</div>
                        <div class="member-last-update">最終更新: ${lastUpdateStr}</div>
                `;

                if (Object.keys(memberStocks).length === 0) {
                    html += `<div style="color: var(--text-light); font-size: 13px; padding: 8px;">未入力</div>`;
                } else {
                    Object.entries(memberStocks).forEach(([reedId, stock]) => {
                        const reed = allReeds[reedId];
                        if (reed) {
                            html += `
                                <div class="reed-stock-item">
                                    <div class="reed-stock-name">${reed.name}</div>
                                    <div class="reed-stock-qty">
                                        ${stock.boxes}箱 (1箱: ${reed.boxCount}本)
                                    </div>
                                </div>
                            `;
                        }
                    });
                }

                html += `</div>`;
            });

            container.innerHTML = html || '<p style="text-align: center; color: var(--text-light); padding: 32px;">データがありません</p>';
        }

        function renderPendingTab(membersData, stocks) {
            const container = document.getElementById('admin-pending-tab');
            
            const pendingMembers = Object.entries(membersData)
                .filter(([memberId]) => !stocks[memberId] || Object.keys(stocks[memberId]).length === 0)
                .map(([memberId, name]) => ({ memberId, name }));

            if (pendingMembers.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: var(--success); padding: 32px; font-weight: 700;">✓ みんな入力完了！</p>';
            } else {
                let html = '';

                pendingMembers.forEach(member => {
                    html += `
                        <div class="pending-item">
                            <div class="pending-name">📋 ${member.name}</div>
                        </div>
                    `;
                });

                container.innerHTML = html;
            }
        }

        function switchAdminTab(tabName) {
            document.getElementById('admin-all-tab').style.display = tabName === 'all' ? 'block' : 'none';
            document.getElementById('admin-pending-tab').style.display = tabName === 'pending' ? 'block' : 'none';

            document.getElementById('tab-all').style.background = tabName === 'all' ? 'var(--accent)' : '';
            document.getElementById('tab-all').style.color = tabName === 'all' ? 'white' : '';

            document.getElementById('tab-pending').style.background = tabName === 'pending' ? 'var(--accent)' : '';
            document.getElementById('tab-pending').style.color = tabName === 'pending' ? 'white' : '';
        }

        // ========================================
        // Excel出力
        // ========================================
        // ========================================
        // Excel出力（CSV形式）
        // ========================================
        async function exportToExcel() {
            console.log('📥 ファイル出力開始');
            
            try {
                await performCSVExport();
            } catch (error) {
                console.error('❌ 出力エラー:', error);
                alert('ファイル出力に失敗しました\n' + error.message);
            }
        }

        async function performCSVExport() {
            console.log('📋 CSV作成開始');
            
            try {
                const membersSnapshot = await db.collection('members')
                    .where('instrument', '==', selectedInstrument)
                    .get();

                const membersData = {};
                const now = new Date();
                
                membersSnapshot.forEach(doc => {
                    membersData[doc.id] = doc.data().name;
                });

                console.log('👥 部員数:', Object.keys(membersData).length);

                const stockSnapshot = await db.collection('member_stocks')
                    .where('instrument', '==', selectedInstrument)
                    .get();

                const stocks = {};
                const lastUpdates = {};
                
                stockSnapshot.forEach(doc => {
                    const data = doc.data();
                    if (!stocks[data.memberId]) {
                        stocks[data.memberId] = {};
                    }
                    stocks[data.memberId][data.reedId] = {
                        boxes: data.boxes || 0
                    };
                    
                    if (data.updatedAt) {
                        lastUpdates[data.memberId] = data.updatedAt.toDate();
                    }
                });

                console.log('📦 在庫データ数:', Object.keys(stocks).length);

                // CSV作成（テーブル形式）
                let csvContent = '';
                
                // ヘッダー行
                const headers = ['入力日時', '名前', 'パート', '銘柄', '何本入り', '保有箱数'];
                csvContent += headers.map(h => `"${h}"`).join(',') + '\n';

                // データ行
                Object.entries(membersData).forEach(([memberId, memberName]) => {
                    const memberStocks = stocks[memberId] || {};
                    const lastUpdate = lastUpdates[memberId];
                    const lastUpdateStr = lastUpdate ? lastUpdate.toLocaleDateString('ja-JP') : '未入力';

                    if (Object.keys(memberStocks).length === 0) {
                        const row = [
                            lastUpdateStr,
                            memberName,
                            getInstrumentName(selectedInstrument),
                            '未入力',
                            '',
                            ''
                        ];
                        csvContent += row.map(cell => `"${cell}"`).join(',') + '\n';
                    } else {
                        let isFirstReed = true;
                        Object.entries(memberStocks).forEach(([reedId, stock]) => {
                            const reed = allReeds[reedId];
                            if (reed) {
                                const row = [
                                    isFirstReed ? lastUpdateStr : '',
                                    isFirstReed ? memberName : '',
                                    isFirstReed ? getInstrumentName(selectedInstrument) : '',
                                    reed.name,
                                    reed.boxCount,
                                    stock.boxes
                                ];
                                csvContent += row.map(cell => `"${cell}"`).join(',') + '\n';
                                isFirstReed = false;
                            }
                        });
                    }
                });

                console.log('📄 CSV作成完了');

                // CSVファイルをダウンロード
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement('a');
                const url = URL.createObjectURL(blob);
                
                const fileName = `リード在庫_${getInstrumentName(selectedInstrument)}_${now.toISOString().split('T')[0]}.csv`;
                link.setAttribute('href', url);
                link.setAttribute('download', fileName);
                link.style.display = 'none';
                document.body.appendChild(link);
                
                console.log('📥 ファイルをダウンロード:', fileName);
                link.click();
                document.body.removeChild(link);

                console.log('✅ 出力完了');
                alert('CSVファイルをダウンロードしました\n(Excel・Numbers・Googleスプレッドシートで開けます)');
            } catch (error) {
                console.error('❌ CSV作成エラー:', error);
                alert('ファイル出力に失敗しました\n' + error.message);
            }
        }

        // ========================================
        // アカウント削除
        // ========================================
        function showDeleteAccountModal() {
            document.getElementById('deleteAccountModal').classList.add('show');
        }

        function closeDeleteAccountModal() {
            document.getElementById('deleteAccountModal').classList.remove('show');
        }

        async function confirmDeleteAccount() {
            if (!confirm('本当に削除しますか？このアカウントのデータはすべて削除されます。')) {
                return;
            }

            try {
                // 部員を削除
                await db.collection('members').doc(currentMemberId).delete();

                // 関連する在庫データを削除
                const stockDocs = await db.collection('member_stocks')
                    .where('memberId', '==', currentMemberId)
                    .get();

                const batch = db.batch();
                stockDocs.forEach(doc => {
                    batch.delete(doc.ref);
                });
                await batch.commit();

                alert('アカウントを削除しました');
                logout();
            } catch (error) {
                console.error('❌ 削除エラー:', error);
                alert('削除に失敗しました\n' + error.message);
            }
        }

        // ========================================
        // ログアウト・その他
        // ========================================
        function logout() {
            currentMemberId = null;
            currentMemberName = null;
            currentReeds = {};
            selectedInstrument = null;
            showScreen('instrument');
        }

        function showSuccessModal(message) {
            document.getElementById('successMessage').textContent = message;
            document.getElementById('successModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('successModal').classList.remove('show');
        }
    </script>

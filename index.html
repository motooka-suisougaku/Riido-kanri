<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>3D Cyber Runner</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial', sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: #0ff; font-size: 24px; pointer-events: none; }
        #msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
               color: #f0f; font-size: 48px; text-align: center; display: none; cursor: pointer; }
    </style>
</head>
<body>
    <div id="ui">Score: <span id="score">0</span></div>
    <div id="msg">GAME OVER<br><span style="font-size:24px">Click to Restart</span></div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        let scene, camera, renderer, player, obstacles = [];
        let score = 0;
        let isGameOver = false;
        let speed = 0.5;

        // 初期化
        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x000000, 10, 50);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 2, 5);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // 自機（プレイヤー）
            const geo = new THREE.ConeGeometry(0.4, 1, 3);
            const mat = new THREE.MeshBasicMaterial({ color: 0x00ffcc, wireframe: true });
            player = new THREE.Mesh(geo, mat);
            player.rotation.x = Math.PI / 2;
            player.position.y = 0.5;
            scene.add(player);

            // 地面（グリッド）
            const grid = new THREE.GridHelper(200, 50, 0xff00ff, 0x444444);
            scene.add(grid);

            // ライト
            const light = new THREE.PointLight(0xffffff, 100);
            light.position.set(0, 5, 5);
            scene.add(light);

            window.addEventListener('resize', onWindowResize);
            document.addEventListener('keydown', handleInput);
            document.getElementById('msg').addEventListener('click', resetGame);

            spawnObstacle();
            animate();
        }

        function handleInput(e) {
            if (isGameOver) return;
            if (e.key === 'ArrowLeft' && player.position.x > -4) player.position.x -= 2;
            if (e.key === 'ArrowRight' && player.position.x < 4) player.position.x += 2;
        }

        function spawnObstacle() {
            if (isGameOver) return;
            const geo = new THREE.BoxGeometry(1.5, 1.5, 1.5);
            const mat = new THREE.MeshBasicMaterial({ color: 0xff0066, wireframe: true });
            const box = new THREE.Mesh(geo, mat);
            
            box.position.set((Math.floor(Math.random() * 5) - 2) * 2, 0.75, -50);
            scene.add(box);
            obstacles.push(box);

            setTimeout(spawnObstacle, Math.max(200, 1000 - score * 2));
        }

        function animate() {
            if (isGameOver) return;
            requestAnimationFrame(animate);

            // スコアと速度の上昇
            score++;
            speed += 0.0001;
            document.getElementById('score').innerText = score;

            // 障害物の移動と判定
            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].position.z += speed;

                // 当たり判定
                if (obstacles[i].position.z > 4 && obstacles[i].position.z < 6) {
                    if (Math.abs(obstacles[i].position.x - player.position.x) < 1) {
                        endGame();
                    }
                }

                // 画面外に出たら削除
                if (obstacles[i].position.z > 10) {
                    scene.remove(obstacles[i]);
                    obstacles.splice(i, 1);
                }
            }

            renderer.render(scene, camera);
        }

        function endGame() {
            isGameOver = true;
            document.getElementById('msg').style.display = 'block';
        }

        function resetGame() {
            location.reload();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        init();
    </script>
</body>
</html>

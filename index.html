<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎺 リード在庫管理v1</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #2c3e50;
            --accent: #e74c3c;
            --accent-light: #f39c12;
            --success: #27ae60;
            --bg: #ecf0f1;
            --card: #ffffff;
            --text: #2c3e50;
            --text-light: #7f8c8d;
            --border: #bdc3c7;
        }

        html, body { height: 100%; width: 100%; }

        body {
            font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: var(--text);
            margin: 0; padding: 0;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }

        .container {
            width: 100%; max-width: 600px;
            background: var(--card);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            margin: 16px;
            max-height: 90vh;
            display: flex; flex-direction: column;
        }

        .screen { display: none; animation: fadeIn 0.4s ease; flex: 1; overflow-y: auto; }
        .screen.active { display: flex; flex-direction: column; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            background: linear-gradient(135deg, var(--primary), #34495e);
            color: white; padding: 20px 24px;
            text-align: center; flex-shrink: 0;
        }
        .header h1 { font-size: 26px; margin-bottom: 4px; font-weight: 700; }
        .header .subtitle { font-size: 13px; opacity: 0.9; }

        .content { padding: 24px 20px; overflow-y: auto; flex: 1; }

        button {
            font-family: inherit; cursor: pointer; border: none;
            border-radius: 8px; font-size: 15px; font-weight: 600;
            transition: all 0.2s ease; padding: 11px 20px;
        }

        .btn { background: var(--accent); color: white; width: 100%; margin-bottom: 12px; }
        .btn:active, .btn:hover { background: #c0392b; transform: scale(0.98); }

        .btn-secondary { background: var(--primary); color: white; }
        .btn-secondary:active, .btn-secondary:hover { background: #1a252f; }

        .btn-success { background: var(--success); color: white; }
        .btn-success:active, .btn-success:hover { background: #229954; }

        .btn-danger { background: #e74c3c; color: white; padding: 5px 10px; font-size: 11px; }
        .btn-danger:hover { background: #c0392b; }

        .btn-warning { background: #ff9800; color: white; padding: 8px 16px; font-size: 13px; width: auto; margin-top: 12px; }
        .btn-warning:hover { background: #e68900; }

        .btn-small { padding: 8px 16px; font-size: 13px; width: auto; }

        .form-group { margin-bottom: 18px; }
        label { display: block; font-weight: 600; margin-bottom: 7px; font-size: 13px; color: var(--text); }

        input[type="text"], input[type="number"], select {
            width: 100%; padding: 11px 12px;
            border: 2px solid var(--border); border-radius: 8px;
            font-size: 15px; font-family: inherit;
            transition: border-color 0.2s ease;
        }
        input[type="text"]:focus, input[type="number"]:focus, select:focus {
            outline: none; border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(231,76,60,0.1);
        }

        .code-input { font-size: 22px; letter-spacing: 6px; text-align: center; font-weight: bold; text-transform: uppercase; }
        .code-hint { text-align: center; font-size: 12px; color: var(--text-light); margin-top: 8px; }

        .instrument-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        .instrument-btn {
            padding: 20px; font-size: 17px;
            background: var(--bg); color: var(--text);
            border: 3px solid var(--border); border-radius: 12px;
            font-weight: 700; transition: all 0.2s ease;
        }
        .instrument-btn:hover, .instrument-btn:active {
            border-color: var(--accent); background: #fff9f5; transform: scale(1.05);
        }

        /* ===== リード選択UI ===== */
        .reed-selector { margin-bottom: 20px; }

        .selector-step {
            background: var(--bg); border-radius: 10px;
            padding: 14px; margin-bottom: 12px;
        }
        .selector-step-title {
            font-weight: 700; font-size: 13px; color: var(--text-light);
            margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px;
        }

        .chip-group { display: flex; flex-wrap: wrap; gap: 8px; }

        .chip {
            padding: 7px 14px; border-radius: 20px; font-size: 13px;
            font-weight: 600; cursor: pointer; border: 2px solid var(--border);
            background: white; color: var(--text);
            transition: all 0.15s ease; user-select: none;
        }
        .chip:hover { border-color: var(--accent); }
        .chip.selected {
            background: var(--accent); color: white;
            border-color: var(--accent);
        }
        .chip.color-silver { border-left: 4px solid #aaa; }
        .chip.color-gold { border-left: 4px solid #d4a017; }
        .chip.color-blue-light { border-left: 4px solid #87ceeb; }
        .chip.color-blue { border-left: 4px solid #1565c0; }
        .chip.color-none { border-left: 4px solid #ccc; }

        .chip.selected.color-silver,
        .chip.selected.color-gold,
        .chip.selected.color-blue-light,
        .chip.selected.color-blue,
        .chip.selected.color-none { border-left: 4px solid white; }

        .reed-preview {
            background: linear-gradient(135deg, var(--primary), #34495e);
            color: white; padding: 12px 16px; border-radius: 8px;
            margin-bottom: 16px; font-weight: 700; font-size: 14px;
            display: none; text-align: center;
        }
        .reed-preview.visible { display: block; }

        /* ===== 数量コントロール ===== */
        .quantity-control {
            display: flex; justify-content: center; align-items: center;
            gap: 20px; margin: 28px 0;
        }
        .qty-btn {
            width: 70px; height: 70px; font-size: 42px; border-radius: 14px;
            background: var(--accent); color: white;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 12px rgba(231,76,60,0.3);
        }
        .qty-btn:active { transform: scale(0.95); }
        .qty-display { text-align: center; }
        .qty-number { font-size: 56px; font-weight: 900; color: var(--accent); line-height: 1; }
        .qty-label { font-size: 13px; color: var(--text-light); margin-top: 6px; }

        /* ===== ダッシュボード ===== */
        .welcome-message {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white; padding: 18px; border-radius: 12px;
            text-align: center; margin-bottom: 18px;
        }
        .welcome-message h2 { font-size: 17px; margin-bottom: 6px; }
        .welcome-message p { font-size: 13px; opacity: 0.95; }

        .reed-card {
            background: var(--primary); color: white;
            padding: 14px; border-radius: 8px; margin-bottom: 14px;
        }
        .reed-card-title {
            font-weight: 700; font-size: 15px; margin-bottom: 6px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .reed-card-info { font-size: 12px; opacity: 0.9; margin-bottom: 12px; }

        /* ===== 管理画面 ===== */
        .member-card {
            background: var(--bg); padding: 14px; border-radius: 8px;
            margin-bottom: 12px; border-left: 4px solid var(--accent);
        }
        .member-name {
            font-weight: 700; font-size: 15px; color: var(--text);
            margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center;
        }
        .member-last-update { font-size: 11px; color: var(--text-light); margin-bottom: 8px; }

        .reed-stock-item {
            background: white; padding: 10px; border-radius: 6px;
            margin-bottom: 7px; border-left: 3px solid var(--success);
        }
        .reed-stock-name { font-weight: 600; color: var(--text); font-size: 13px; margin-bottom: 3px; }
        .reed-stock-qty { font-size: 12px; color: var(--text-light); }

        .pending-item {
            background: #fff3cd; padding: 10px; border-radius: 6px;
            margin-bottom: 7px; border-left: 3px solid #ff9800;
        }
        .pending-name { font-weight: 600; color: #856404; font-size: 13px; }

        /* ===== 全体集計カード ===== */
        .aggregate-card {
            background: white; border: 2px solid var(--border);
            border-radius: 10px; margin-bottom: 12px; overflow: hidden;
        }
        .aggregate-header {
            background: linear-gradient(135deg, var(--primary), #34495e);
            color: white; padding: 12px 16px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .aggregate-reed-name { font-weight: 700; font-size: 15px; }
        .aggregate-total {
            font-size: 22px; font-weight: 900;
            background: rgba(255,255,255,0.2); padding: 4px 12px;
            border-radius: 20px;
        }
        .aggregate-body { padding: 12px 16px; }
        .aggregate-member-row {
            display: flex; justify-content: space-between;
            font-size: 13px; padding: 4px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .aggregate-member-row:last-child { border-bottom: none; }
        .aggregate-member-name { color: var(--text); }
        .aggregate-member-boxes { font-weight: 700; color: var(--accent); }

        /* ===== リード管理（管理者） ===== */
        .admin-reed-item {
            display: flex; align-items: center; justify-content: space-between;
            background: var(--bg); padding: 10px 14px; border-radius: 8px;
            margin-bottom: 8px; border-left: 3px solid var(--primary);
        }
        .admin-reed-name { font-weight: 600; font-size: 14px; }
        .admin-reed-meta { font-size: 11px; color: var(--text-light); margin-top: 2px; }

        /* ===== タブ ===== */
        .tab-bar {
            display: flex; gap: 6px; margin-bottom: 18px; flex-wrap: wrap;
        }
        .tab-btn {
            flex: 1; padding: 9px 10px; font-size: 12px; font-weight: 700;
            background: var(--bg); color: var(--text);
            border: 2px solid var(--border); border-radius: 8px;
            cursor: pointer; text-align: center; transition: all 0.2s;
            min-width: 0;
        }
        .tab-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        /* ===== モーダル ===== */
        .modal {
            display: none; position: fixed; z-index: 1000;
            left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            align-items: center; justify-content: center;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: white; padding: 28px; border-radius: 16px;
            max-width: 400px; width: 90%; text-align: center;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .modal-content h2 { font-size: 26px; margin-bottom: 10px; color: var(--success); }
        .modal-content p { font-size: 15px; color: var(--text-light); margin-bottom: 18px; }

        .back-button {
            background: var(--text-light); color: white;
            margin-bottom: 14px; font-size: 13px;
        }
        .back-button:hover, .back-button:active { background: var(--text); }

        .section-title {
            font-size: 13px; font-weight: 700; color: var(--text-light);
            text-transform: uppercase; letter-spacing: 1px;
            margin: 18px 0 10px; padding-bottom: 6px;
            border-bottom: 2px solid var(--border);
        }

        @media (max-width: 600px) {
            .container { border-radius: 0; margin: 0; max-height: 100vh; }
            .content { padding: 18px 14px; }
            .header h1 { font-size: 22px; }
            .instrument-buttons { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="container">

    <!-- Screen 1: セキュリティコード -->
    <div id="screen-security" class="screen active">
        <div class="header">
            <h1>🎺 リード在庫管理</h1>
            <p class="subtitle">吹奏楽部</p>
        </div>
        <div class="content">
            <div class="form-group">
                <label>セキュリティコードを入力</label>
                <input type="text" id="securityCode" class="code-input" placeholder="例: ONGAKUDO" maxlength="10">
                <p class="code-hint">学校から指定されたコードを入力してください</p>
            </div>
            <button class="btn" onclick="verifySecurity()">進む</button>
        </div>
    </div>

    <!-- Screen 2: 楽器選択 -->
    <div id="screen-instrument" class="screen">
        <div class="header">
            <h1>🎺 楽器を選択</h1>
            <p class="subtitle">あなたの楽器は？</p>
        </div>
        <div class="content">
            <div class="instrument-buttons">
                <button class="instrument-btn" onclick="selectInstrument('Saxophone')">🎷 サックス</button>
                <button class="instrument-btn" onclick="selectInstrument('Clarinet')">🎺 クラリネット</button>
            </div>
        </div>
    </div>

    <!-- Screen 3: ログイン・新規登録 -->
    <div id="screen-register-or-login" class="screen">
        <div class="header">
            <h1>ログイン</h1>
            <p class="subtitle" id="registerOrLoginSubtitle"></p>
        </div>
        <div class="content">
            <button class="back-button" onclick="showScreen('instrument')">＜ 戻る</button>
            <div id="login-section">
                <div class="form-group">
                    <label>あなたの名前を選択</label>
                    <select id="memberSelect">
                        <option value="">-- 選択してください --</option>
                    </select>
                </div>
                <button class="btn" onclick="loginMember()">ログイン</button>
                <p style="text-align:center;margin-top:14px;color:var(--text-light);font-size:12px;">初めての方は下へ ↓</p>
            </div>
            <button class="btn-secondary btn-small" onclick="toggleRegisterForm()" style="width:100%;margin-top:14px;">新規登録 →</button>
            <div id="register-section" style="display:none;margin-top:18px;padding-top:18px;border-top:2px solid var(--border);">
                <div class="form-group">
                    <label>新しい名前を入力</label>
                    <input type="text" id="newMemberName" placeholder="例: 田中太郎">
                </div>
                <button class="btn-success" onclick="registerNewMember()">新規登録</button>
                <button class="btn-secondary btn-small" onclick="toggleRegisterForm()" style="width:100%;margin-top:10px;">← ログイン画面に戻る</button>
            </div>
        </div>
    </div>

    <!-- Screen 4: リード追加（選択式） -->
    <div id="screen-add-reed" class="screen">
        <div class="header">
            <h1>🎵 リードを追加</h1>
            <p class="subtitle">銘柄を選んで登録</p>
        </div>
        <div class="content">
            <button class="back-button" onclick="showScreen('dashboard')">＜ ダッシュボードへ</button>

            <!-- ステップ1: メーカー -->
            <div class="reed-selector">
                <div class="selector-step">
                    <div class="selector-step-title">① メーカー</div>
                    <div class="chip-group" id="maker-chips"></div>
                </div>

                <!-- ステップ2: カラー -->
                <div class="selector-step" id="color-step" style="display:none;">
                    <div class="selector-step-title">② カラー</div>
                    <div class="chip-group" id="color-chips"></div>
                </div>

                <!-- ステップ3: 強度 -->
                <div class="selector-step" id="strength-step" style="display:none;">
                    <div class="selector-step-title">③ 強度</div>
                    <div class="chip-group" id="strength-chips"></div>
                </div>
            </div>

            <!-- 選択中プレビュー -->
            <div class="reed-preview" id="reed-preview">📋 選択中：<span id="reed-preview-text"></span></div>

            <!-- 箱数入力 -->
            <div class="form-group" id="boxcount-group" style="display:none;">
                <label>1箱の入数（本数）</label>
                <input type="number" id="reedBoxCount" placeholder="例: 10" min="1">
            </div>

            <button class="btn-success" id="add-reed-btn" style="display:none;" onclick="addNewReed()">このリードを追加</button>
        </div>
    </div>

    <!-- Screen 5: ダッシュボード -->
    <div id="screen-dashboard" class="screen">
        <div class="header">
            <h1 id="dashboardName">ようこそ</h1>
            <p class="subtitle">リード在庫管理</p>
        </div>
        <div class="content">
            <div class="welcome-message">
                <h2>あなたのリード在庫を更新</h2>
                <p>保有箱数を入力してください</p>
            </div>
            <button class="btn-secondary btn-small" onclick="showScreen('add-reed')" style="width:100%;margin-bottom:14px;">+ 新しいリード銘柄を追加</button>
            <div id="reedsList"></div>
            <button class="btn" onclick="logout()" style="margin-top:20px;">ログアウト</button>
            <button class="btn-secondary btn-small" onclick="showScreen('admin')" style="width:100%;margin-bottom:10px;margin-top:8px;">👥 全員の在庫確認</button>
            <button class="btn-warning" onclick="showDeleteAccountModal()">🗑️ アカウント削除</button>
        </div>
    </div>

    <!-- Screen 6: 管理画面 -->
    <div id="screen-admin" class="screen">
        <div class="header">
            <h1>👥 管理画面</h1>
            <p class="subtitle" id="adminSubtitle">リード在庫状況</p>
        </div>
        <div class="content">
            <button class="back-button" onclick="showScreen('dashboard')">＜ ダッシュボードへ</button>

            <div class="tab-bar">
                <button class="tab-btn active" id="tab-all" onclick="switchAdminTab('all')">📊 全員の在庫</button>
                <button class="tab-btn" id="tab-aggregate" onclick="switchAdminTab('aggregate')">📦 全体集計</button>
                <button class="tab-btn" id="tab-pending" onclick="switchAdminTab('pending')">📋 未入力</button>
                <button class="tab-btn" id="tab-manage" onclick="switchAdminTab('manage')">⚙️ リード管理</button>
                <button class="tab-btn" id="tab-excel" onclick="exportToExcel()">📥 CSV出力</button>
            </div>

            <div id="admin-all-tab"></div>
            <div id="admin-aggregate-tab" style="display:none;"></div>
            <div id="admin-pending-tab" style="display:none;"></div>
            <div id="admin-manage-tab" style="display:none;"></div>
        </div>
    </div>

    <!-- 成功モーダル -->
    <div id="successModal" class="modal">
        <div class="modal-content">
            <h2>✓ 完了！</h2>
            <p id="successMessage">入力が保存されました</p>
            <button class="btn-secondary" onclick="closeModal()">ダッシュボードに戻る</button>
        </div>
    </div>

    <!-- アカウント削除モーダル -->
    <div id="deleteAccountModal" class="modal">
        <div class="modal-content">
            <h2>⚠️ アカウント削除</h2>
            <p>本当にアカウントを削除しますか？<br>この操作は取り消せません。</p>
            <button class="btn-secondary" onclick="closeDeleteAccountModal()" style="margin-bottom:10px;">キャンセル</button>
            <button class="btn-danger" onclick="confirmDeleteAccount()" style="width:100%;padding:10px;">削除確定</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyA2mI7Cv1gIbUKwfuFKQkDj_QVx6WmiZfU",
    authDomain: "riidokanri.firebaseapp.com",
    projectId: "riidokanri",
    storageBucket: "riidokanri.firebasestorage.app",
    messagingSenderId: "437505590526",
    appId: "1:437505590526:web:463ca03512bdca988a11af"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ========================================
// グローバル変数
// ========================================
let currentScreen = 'security';
const SECURITY_CODE = 'ONGAKUDO';
let selectedInstrument = null;
let currentMemberId = null;
let currentMemberName = null;
let currentReeds = {};          // { reedId: { boxes: N } }
let allMembers = [];
let allReeds = {};              // Firestore reeds collection

// リード選択用
let selectedMaker = null;
let selectedColor = null;
let selectedStrength = null;

// カラーラベル定義（Firestoreから動的に読み込む。ここはフォールバック用デフォルト）
// 各カラーは { label: '表示名', hex: '#rrggbb' } の形式でFirestoreに保存
const DEFAULT_COLORS = [
    { key: 'none',       label: '無色', hex: '#cccccc' },
    { key: 'silver',     label: '銀',   hex: '#aaaaaa' },
    { key: 'gold',       label: '金',   hex: '#d4a017' },
    { key: 'light-blue', label: '水色', hex: '#87ceeb' },
    { key: 'blue',       label: '青',   hex: '#1565c0' },
];

// 現在有効なカラー一覧（Firestoreから読んだもの）
let activeColors = [...DEFAULT_COLORS];

function getColorInfo(keyOrLabel) {
    return activeColors.find(c => c.key === keyOrLabel || c.label === keyOrLabel) || { label: keyOrLabel, hex: '#999' };
}

// ========================================
// スクリーン管理
// ========================================
function showScreen(name) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    const el = document.getElementById(`screen-${name}`);
    if (el) el.classList.add('active');
    currentScreen = name;

    if (name === 'register-or-login') loadMembers();
    else if (name === 'dashboard') loadDashboard();
    else if (name === 'admin') loadAdmin();
    else if (name === 'add-reed') initAddReedScreen();
}

// ========================================
// Screen 1: セキュリティコード
// ========================================
function verifySecurity() {
    const code = document.getElementById('securityCode').value.trim().toUpperCase();
    if (!code) { alert('コードを入力してください'); return; }
    if (code === SECURITY_CODE) showScreen('instrument');
    else alert('コードが正しくありません');
}

// ========================================
// Screen 2: 楽器選択
// ========================================
function selectInstrument(instrument) {
    selectedInstrument = instrument;
    document.getElementById('registerOrLoginSubtitle').textContent = `あなたの楽器: ${getInstrumentName(instrument)}`;
    showScreen('register-or-login');
}

function getInstrumentName(instrument) {
    return { 'Saxophone': 'サックス', 'Clarinet': 'クラリネット' }[instrument] || instrument;
}

// ========================================
// Screen 3: ログイン・新規登録
// ========================================
async function loadMembers() {
    try {
        const snapshot = await db.collection('members').where('instrument', '==', selectedInstrument).get();
        const select = document.getElementById('memberSelect');
        select.innerHTML = '<option value="">-- 選択してください --</option>';
        allMembers = [];
        snapshot.forEach(doc => {
            allMembers.push({ id: doc.id, ...doc.data() });
            const opt = document.createElement('option');
            opt.value = doc.id;
            opt.textContent = doc.data().name;
            select.appendChild(opt);
        });
    } catch (e) { alert('データ取得に失敗しました\n' + e.message); }
}

function loginMember() {
    const memberId = document.getElementById('memberSelect').value;
    if (!memberId) { alert('名前を選択してください'); return; }
    currentMemberId = memberId;
    const member = allMembers.find(m => m.id === memberId);
    currentMemberName = member.name;
    showScreen('dashboard');
}

function toggleRegisterForm() {
    const ls = document.getElementById('login-section');
    const rs = document.getElementById('register-section');
    ls.style.display = ls.style.display === 'none' ? 'block' : 'none';
    rs.style.display = rs.style.display === 'none' ? 'block' : 'none';
}

async function registerNewMember() {
    const name = document.getElementById('newMemberName').value.trim();
    if (!name) { alert('名前を入力してください'); return; }
    try {
        const ref = await db.collection('members').add({
            name, instrument: selectedInstrument,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        currentMemberId = ref.id;
        currentMemberName = name;
        document.getElementById('newMemberName').value = '';
        await loadMembers();
        showScreen('dashboard');
    } catch (e) { alert('登録に失敗しました\n' + e.message); }
}

// Screen 4: リード追加（選択式）
// ========================================
async function initAddReedScreen() {
    selectedMaker = null;
    selectedColor = null;
    selectedStrength = null;

    // ステップをリセット
    document.getElementById('color-step').style.display = 'none';
    document.getElementById('strength-step').style.display = 'none';
    document.getElementById('reed-preview').classList.remove('visible');
    document.getElementById('boxcount-group').style.display = 'none';
    document.getElementById('add-reed-btn').style.display = 'none';

    // Firestoreからメーカー＆設定を取得
    try {
        const snap = await db.collection('reed_options').doc('config').get();
        const config = snap.exists ? snap.data() : getDefaultConfig();
        // colorsが旧形式（文字列配列）の場合はデフォルトにフォールバック
        if (config.colors && typeof config.colors[0] === 'object') {
            activeColors = config.colors;
        } else {
            activeColors = [...DEFAULT_COLORS];
        }
        renderMakerChips(config);
        window._reedConfig = config;
    } catch (e) {
        activeColors = [...DEFAULT_COLORS];
        window._reedConfig = getDefaultConfig();
        renderMakerChips(window._reedConfig);
    }
}

function getDefaultConfig() {
    return {
        makers: ['YAMAHA', 'Vandoren', 'Rico', 'La Voz', 'D\'Addario'],
        colors: [...DEFAULT_COLORS],
        strengths: ['1', '1.5', '2', '2.5', '3', '3.5', '4', '4.5', '5']
    };
}

function renderMakerChips(config) {
    const container = document.getElementById('maker-chips');
    container.innerHTML = '';
    (config.makers || []).forEach(maker => {
        const chip = document.createElement('button');
        chip.className = 'chip';
        chip.textContent = maker;
        chip.onclick = () => selectMaker(maker, chip);
        container.appendChild(chip);
    });
}

function selectMaker(maker, chipEl) {
    selectedMaker = maker;
    selectedColor = null;
    selectedStrength = null;
    document.querySelectorAll('#maker-chips .chip').forEach(c => c.classList.remove('selected'));
    chipEl.classList.add('selected');

    // カラーステップを表示
    const config = window._reedConfig || getDefaultConfig();
    const colorStep = document.getElementById('color-step');
    colorStep.style.display = 'block';
    document.getElementById('strength-step').style.display = 'none';
    document.getElementById('reed-preview').classList.remove('visible');
    document.getElementById('boxcount-group').style.display = 'none';
    document.getElementById('add-reed-btn').style.display = 'none';

    const container = document.getElementById('color-chips');
    container.innerHTML = '';
    const colors = config.colors || activeColors;
    colors.forEach(colorObj => {
        // 旧形式（文字列）との互換性
        const c = typeof colorObj === 'object' ? colorObj : getColorInfo(colorObj);
        const chip = document.createElement('button');
        chip.className = 'chip';
        chip.textContent = c.label;
        chip.style.borderLeft = `4px solid ${c.hex}`;
        chip.onclick = () => selectColor(c.key || c.label, c.label, chip);
        container.appendChild(chip);
    });
}

function selectColor(colorKey, colorLabel, chipEl) {
    selectedColor = colorKey;
    selectedStrength = null;
    document.querySelectorAll('#color-chips .chip').forEach(c => c.classList.remove('selected'));
    chipEl.classList.add('selected');

    const config = window._reedConfig || getDefaultConfig();
    const strengthStep = document.getElementById('strength-step');
    strengthStep.style.display = 'block';
    document.getElementById('reed-preview').classList.remove('visible');
    document.getElementById('boxcount-group').style.display = 'none';
    document.getElementById('add-reed-btn').style.display = 'none';

    const container = document.getElementById('strength-chips');
    container.innerHTML = '';
    (config.strengths || []).forEach(s => {
        const chip = document.createElement('button');
        chip.className = 'chip';
        chip.textContent = s;
        chip.onclick = () => selectStrength(s, chip);
        container.appendChild(chip);
    });
}

function selectStrength(strength, chipEl) {
    selectedStrength = strength;
    document.querySelectorAll('#strength-chips .chip').forEach(c => c.classList.remove('selected'));
    chipEl.classList.add('selected');

    const colorLabel = getColorInfo(selectedColor).label;
    const reedFullName = `${selectedMaker} ${colorLabel} ${selectedStrength}`;
    document.getElementById('reed-preview-text').textContent = reedFullName;
    document.getElementById('reed-preview').classList.add('visible');
    document.getElementById('boxcount-group').style.display = 'block';
    document.getElementById('add-reed-btn').style.display = 'block';
}

function buildReedName() {
    const colorLabel = getColorInfo(selectedColor).label;
    return `${selectedMaker} ${colorLabel} ${selectedStrength}`;
}

async function addNewReed() {
    if (!selectedMaker || !selectedColor || !selectedStrength) {
        alert('メーカー・カラー・強度を選択してください'); return;
    }
    const boxCount = parseInt(document.getElementById('reedBoxCount').value);
    if (!boxCount || boxCount < 1) { alert('1箱の入数を入力してください'); return; }

    const reedName = buildReedName();

    // 既存のリードがFirestoreにあるか確認（同じ楽器・同じ名前）
    try {
        const existing = await db.collection('reeds')
            .where('instrument', '==', selectedInstrument)
            .where('name', '==', reedName)
            .get();

        let reedId;
        if (!existing.empty) {
            reedId = existing.docs[0].id;
        } else {
            const ref = await db.collection('reeds').add({
                name: reedName,
                maker: selectedMaker,
                color: selectedColor,
                strength: selectedStrength,
                boxCount: boxCount,
                instrument: selectedInstrument,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            reedId = ref.id;
        }

        // メンバーの在庫に追加（既存チェック）
        const existingStock = await db.collection('member_stocks')
            .where('memberId', '==', currentMemberId)
            .where('reedId', '==', reedId)
            .get();

        if (!existingStock.empty) {
            alert(`「${reedName}」はすでに登録されています`);
            return;
        }

        await db.collection('member_stocks').add({
            memberId: currentMemberId,
            memberName: currentMemberName,
            reedId: reedId,
            reedName: reedName,
            boxes: 0,
            instrument: selectedInstrument,
            isCustomReed: false,
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        showSuccessModal(`「${reedName}」を追加しました！`);
        setTimeout(() => { showScreen('dashboard'); }, 1500);
    } catch (e) { alert('追加に失敗しました\n' + e.message); }
}

// ========================================
// Screen 5: ダッシュボード
// ========================================
let currentReedDetails = {}; // renderDashboard用にグローバルで保持

async function loadDashboard() {
    document.getElementById('dashboardName').textContent = `${currentMemberName}さん、おはよう！`;
    try {
        const stockSnap = await db.collection('member_stocks')
            .where('memberId', '==', currentMemberId).get();

        currentReeds = {};
        const reedIds = [];

        stockSnap.forEach(doc => {
            const d = doc.data();
            currentReeds[doc.id] = {
                reedId: d.reedId,
                reedName: d.reedName,
                boxes: d.boxes || 0,
                stockDocId: doc.id
            };
            if (d.reedId) reedIds.push(d.reedId);
        });

        // リード詳細を取得
        currentReedDetails = {};
        for (const rid of [...new Set(reedIds)]) {
            const rdoc = await db.collection('reeds').doc(rid).get();
            if (rdoc.exists) currentReedDetails[rid] = { id: rid, ...rdoc.data() };
        }

        renderDashboard();
    } catch (e) { console.error(e); }
}

function renderDashboard() {
    const container = document.getElementById('reedsList');
    if (Object.keys(currentReeds).length === 0) {
        container.innerHTML = `
            <div style="text-align:center;padding:28px 0;color:var(--text-light);">
                <p style="font-size:14px;">まだリードが登録されていません</p>
                <p style="font-size:12px;margin-top:6px;">「新しいリード銘柄を追加」から追加してください</p>
            </div>`;
        return;
    }

    let html = '';
    Object.entries(currentReeds).forEach(([stockDocId, stock]) => {
        const reed = currentReedDetails[stock.reedId] || {};
        const name = stock.reedName || reed.name || '不明';
        const boxCount = reed.boxCount || '?';

        html += `
            <div class="reed-card">
                <div class="reed-card-title">
                    <span>${name}</span>
                    <button class="btn-danger" onclick="deleteMyReed('${stockDocId}')">削除</button>
                </div>
                <div class="reed-card-info">1箱: ${boxCount}本入り</div>
                <div style="background:rgba(255,255,255,0.15);padding:12px;border-radius:8px;">
                    <label style="font-size:14px;color:rgba(255,255,255,0.95);font-weight:700;">保有箱数</label>
                    <div class="quantity-control">
                        <button class="qty-btn" onclick="adjustBoxes('${stockDocId}', -1)">−</button>
                        <div class="qty-display">
                            <div class="qty-number" style="color:white;">${stock.boxes}</div>
                            <div class="qty-label" style="color:rgba(255,255,255,0.8);">箱</div>
                        </div>
                        <button class="qty-btn" onclick="adjustBoxes('${stockDocId}', +1)">+</button>
                    </div>
                </div>
            </div>`;
    });

    html += `<button class="btn-success" onclick="saveReeds()" style="margin-top:16px;font-size:17px;padding:15px;">📝 これで完了！送信</button>`;
    container.innerHTML = html;
}

function adjustBoxes(stockDocId, delta) {
    if (!currentReeds[stockDocId]) return;
    currentReeds[stockDocId].boxes = Math.max(0, currentReeds[stockDocId].boxes + delta);
    renderDashboard(); // Firestoreを叩かず再描画のみ
}

async function deleteMyReed(stockDocId) {
    if (!confirm('このリード銘柄をあなたのリストから削除しますか？')) return;
    try {
        await db.collection('member_stocks').doc(stockDocId).delete();
        delete currentReeds[stockDocId];
        renderDashboard();
    } catch (e) { alert('削除に失敗しました\n' + e.message); }
}

async function saveReeds() {
    try {
        const batch = db.batch();
        Object.entries(currentReeds).forEach(([stockDocId, stock]) => {
            const ref = db.collection('member_stocks').doc(stockDocId);
            batch.update(ref, {
                boxes: stock.boxes,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            });
        });
        await batch.commit();
        showSuccessModal('お疲れ様でした！\nデータが保存されました');
        setTimeout(() => { loadDashboard(); }, 1500);
    } catch (e) { alert('保存に失敗しました\n' + e.message); }
}

let adminData = {};

async function loadAdmin() {
    document.getElementById('adminSubtitle').textContent = getInstrumentName(selectedInstrument);
    switchAdminTab('all');
    await fetchAdminData();
    renderAllTab();
}

async function fetchAdminData() {
    const membersSnap = await db.collection('members').where('instrument', '==', selectedInstrument).get();
    const reedsSnap   = await db.collection('reeds').where('instrument', '==', selectedInstrument).get();
    const stocksSnap  = await db.collection('member_stocks').where('instrument', '==', selectedInstrument).get();

    const members = {};
    membersSnap.forEach(d => { members[d.id] = d.data().name; });

    const reeds = {};
    reedsSnap.forEach(d => { reeds[d.id] = { id: d.id, ...d.data() }; });

    const stocks = {}; // { memberId: [ { reedId, reedName, boxes, boxCount } ] }
    const lastUpdates = {};
    stocksSnap.forEach(d => {
        const data = d.data();
        if (!stocks[data.memberId]) stocks[data.memberId] = [];
        const reed = reeds[data.reedId] || {};
        stocks[data.memberId].push({
            reedId: data.reedId,
            reedName: data.reedName || reed.name || '不明',
            boxes: data.boxes || 0,
            boxCount: reed.boxCount || data.boxCount || '?'
        });
        if (data.updatedAt) lastUpdates[data.memberId] = data.updatedAt.toDate();
    });

    adminData = { members, reeds, stocks, lastUpdates };
}

function renderAllTab() {
    const container = document.getElementById('admin-all-tab');
    const { members, stocks, lastUpdates } = adminData;
    let html = '';
    Object.entries(members).forEach(([memberId, memberName]) => {
        const memberStocks = stocks[memberId] || [];
        const lastUpdate = lastUpdates[memberId];
        const lastUpdateStr = lastUpdate ? lastUpdate.toLocaleDateString('ja-JP') : '未入力';

        html += `<div class="member-card">
            <div class="member-name">👤 ${memberName}</div>
            <div class="member-last-update">最終更新: ${lastUpdateStr}</div>`;

        if (memberStocks.length === 0) {
            html += `<div style="color:var(--text-light);font-size:12px;padding:6px;">未入力</div>`;
        } else {
            memberStocks.forEach(s => {
                html += `<div class="reed-stock-item">
                    <div class="reed-stock-name">${s.reedName}</div>
                    <div class="reed-stock-qty">${s.boxes}箱 (1箱: ${s.boxCount}本)</div>
                </div>`;
            });
        }
        html += `</div>`;
    });
    container.innerHTML = html || '<p style="text-align:center;color:var(--text-light);padding:28px;">データがありません</p>';
}

function renderAggregateTab() {
    const container = document.getElementById('admin-aggregate-tab');
    const { members, stocks } = adminData;

    // リード名ごとに集計
    const aggregated = {}; // { reedName: { total, members: [ {name, boxes} ] } }
    Object.entries(stocks).forEach(([memberId, memberStocks]) => {
        const memberName = members[memberId] || '不明';
        memberStocks.forEach(s => {
            if (!aggregated[s.reedName]) {
                aggregated[s.reedName] = { total: 0, members: [], boxCount: s.boxCount };
            }
            aggregated[s.reedName].total += s.boxes;
            if (s.boxes > 0) {
                aggregated[s.reedName].members.push({ name: memberName, boxes: s.boxes });
            }
        });
    });

    if (Object.keys(aggregated).length === 0) {
        container.innerHTML = '<p style="text-align:center;color:var(--text-light);padding:28px;">データがありません</p>';
        return;
    }

    // 合計箱数が多い順にソート
    const sorted = Object.entries(aggregated).sort((a, b) => b[1].total - a[1].total);

    let html = '<div class="section-title">📦 リード別・全体合計在庫</div>';
    sorted.forEach(([reedName, info]) => {
        const membersHtml = info.members.map(m =>
            `<div class="aggregate-member-row">
                <span class="aggregate-member-name">👤 ${m.name}</span>
                <span class="aggregate-member-boxes">${m.boxes}箱</span>
            </div>`
        ).join('');

        html += `
            <div class="aggregate-card">
                <div class="aggregate-header">
                    <div class="aggregate-reed-name">🎵 ${reedName}</div>
                    <div class="aggregate-total">計 ${info.total}箱</div>
                </div>
                <div class="aggregate-body">
                    ${membersHtml || '<div style="font-size:12px;color:var(--text-light);">保有者なし（全員0箱）</div>'}
                    <div style="font-size:11px;color:var(--text-light);margin-top:8px;text-align:right;">1箱: ${info.boxCount}本入り</div>
                </div>
            </div>`;
    });

    container.innerHTML = html;
}

function renderPendingTab() {
    const container = document.getElementById('admin-pending-tab');
    const { members, stocks } = adminData;
    // stocks[mid] が存在しない（一度も入力していない）人だけ未入力扱い
    const pendingMembers = Object.entries(members)
        .filter(([mid]) => !stocks[mid] || stocks[mid].length === 0);

    if (pendingMembers.length === 0) {
        container.innerHTML = '<p style="text-align:center;color:var(--success);padding:28px;font-weight:700;">✓ みんな入力完了！</p>';
    } else {
        container.innerHTML = pendingMembers.map(([, name]) =>
            `<div class="pending-item"><div class="pending-name">📋 ${name}</div></div>`
        ).join('');
    }
}

            <button class="btn-danger" onclick="removeMakerOption('${maker}')">削除</button>
        </div>`).join('');
}

function renderManageStrengths(strengths) {
    const container = document.getElementById('manage-strengths-list');
    if (!container) return;
    container.innerHTML = strengths.map(s => `
        <div class="admin-reed-item">
            <div class="admin-reed-name">${s}</div>
            <button class="btn-danger" onclick="removeStrengthOption('${s}')">削除</button>
        </div>`).join('');
}

function renderManageColors(colors) {
    const container = document.getElementById('manage-colors-list');
    if (!container) return;
    container.innerHTML = colors.map((c, i) => `
        <div class="admin-reed-item">
            <div style="display:flex;align-items:center;gap:10px;">
                <span style="display:inline-block;width:20px;height:20px;border-radius:50%;
                    background:${c.hex};border:2px solid #ccc;flex-shrink:0;"></span>
                <div class="admin-reed-name">${c.label}</div>
            </div>
            <button class="btn-danger" onclick="removeColorOption(${i})">削除</button>
        </div>`).join('');
}

async function addColorOption() {
    const labelInput = document.getElementById('new-color-label-input');
    const hexInput   = document.getElementById('new-color-hex-input');
    const label = labelInput.value.trim();
    const hex   = hexInput.value;

    if (!label) { alert('カラー名を入力してください'); return; }

    const config = window._manageConfig || getDefaultConfig();
    if (!config.colors || typeof config.colors[0] === 'string') config.colors = [...DEFAULT_COLORS];
    if (config.colors.some(c => c.label === label)) { alert('同じ名前のカラーがすでに存在します'); return; }

    const key = label.replace(/\s+/g, '-').toLowerCase() + '-' + Date.now();
    config.colors.push({ key, label, hex });
    activeColors = config.colors;
    await saveReedConfig(config);
    labelInput.value = '';
    renderManageColors(config.colors);
}

async function removeColorOption(index) {
    const config = window._manageConfig || getDefaultConfig();
    if (!config.colors || typeof config.colors[0] === 'string') config.colors = [...DEFAULT_COLORS];
    const removed = config.colors[index];
    if (!removed) return;
    if (!confirm(`「${removed.label}」を削除しますか？`)) return;
    config.colors.splice(index, 1);
    activeColors = config.colors;
    await saveReedConfig(config);
    renderManageColors(config.colors);
}

async function addMakerOption() {
    const input = document.getElementById('new-maker-input');
    const val = input.value.trim();
    if (!val) { alert('メーカー名を入力してください'); return; }

    const config = window._manageConfig || getDefaultConfig();
    if (config.makers.includes(val)) { alert('すでに存在します'); return; }
    config.makers.push(val);
    await saveReedConfig(config);
    input.value = '';
    renderManageMakers(config.makers);
}

async function removeMakerOption(maker) {
    if (!confirm(`「${maker}」を削除しますか？`)) return;
    const config = window._manageConfig || getDefaultConfig();
    config.makers = config.makers.filter(m => m !== maker);
    await saveReedConfig(config);
    renderManageMakers(config.makers);
}

async function addStrengthOption() {
    const input = document.getElementById('new-strength-input');
    const val = input.value.trim();
    if (!val) { alert('強度を入力してください'); return; }

    const config = window._manageConfig || getDefaultConfig();
    if (config.strengths.includes(val)) { alert('すでに存在します'); return; }
    // 数値順にソート
    config.strengths.push(val);
    config.strengths.sort((a, b) => parseFloat(a) - parseFloat(b));
    await saveReedConfig(config);
    input.value = '';
    renderManageStrengths(config.strengths);
}

async function removeStrengthOption(strength) {
    if (!confirm(`「${strength}」を削除しますか？`)) return;
    const config = window._manageConfig || getDefaultConfig();
    config.strengths = config.strengths.filter(s => s !== strength);
    await saveReedConfig(config);
    renderManageStrengths(config.strengths);
}

async function saveReedConfig(config) {
    try {
        await db.collection('reed_options').doc('config').set(config);
        window._manageConfig = config;
        if (config.colors && typeof config.colors[0] === 'object') {
            activeColors = config.colors;
        }
    } catch (e) { alert('保存に失敗しました\n' + e.message); }
}

// ========================================
// タブ切り替え
// ========================================
function switchAdminTab(tabName) {
    ['all', 'aggregate', 'pending', 'manage'].forEach(t => {
        document.getElementById(`admin-${t}-tab`).style.display = 'none';
        const btn = document.getElementById(`tab-${t}`);
        if (btn) btn.classList.remove('active');
    });
    document.getElementById(`admin-${tabName}-tab`).style.display = 'block';
    const activeBtn = document.getElementById(`tab-${tabName}`);
    if (activeBtn) activeBtn.classList.add('active');

    if (tabName === 'aggregate') renderAggregateTab();
    else if (tabName === 'pending') renderPendingTab();
    else if (tabName === 'manage') renderManageTab();
    else if (tabName === 'all') renderAllTab();
}

// ========================================
// CSV出力
// ========================================
async function exportToExcel() {
    try {
        await fetchAdminData();
        const { members, stocks, lastUpdates } = adminData;
        const headers = ['入力日時', '名前', 'パート', '銘柄', '何本入り', '保有箱数'];
        let csv = headers.map(h => `"${h}"`).join(',') + '\n';

        Object.entries(members).forEach(([memberId, memberName]) => {
            const memberStocks = stocks[memberId] || [];
            const lu = lastUpdates[memberId];
            const luStr = lu ? lu.toLocaleDateString('ja-JP') : '未入力';

            if (memberStocks.length === 0) {
                csv += [luStr, memberName, getInstrumentName(selectedInstrument), '未入力', '', ''].map(c => `"${c}"`).join(',') + '\n';
            } else {
                memberStocks.forEach((s, i) => {
                    csv += [
                        i === 0 ? luStr : '',
                        i === 0 ? memberName : '',
                        i === 0 ? getInstrumentName(selectedInstrument) : '',
                        s.reedName, s.boxCount, s.boxes
                    ].map(c => `"${c}"`).join(',') + '\n';
                });
            }
        });

        const bom = '\uFEFF';
        const blob = new Blob([bom + csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `リード在庫_${getInstrumentName(selectedInstrument)}_${new Date().toISOString().split('T')[0]}.csv`;
        link.style.display = 'none';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        alert('CSVファイルをダウンロードしました');
    } catch (e) { alert('出力に失敗しました\n' + e.message); }
}

// ========================================
// アカウント削除
// ========================================
function showDeleteAccountModal() { document.getElementById('deleteAccountModal').classList.add('show'); }
function closeDeleteAccountModal() { document.getElementById('deleteAccountModal').classList.remove('show'); }

async function confirmDeleteAccount() {
    if (!confirm('本当に削除しますか？このアカウントのデータはすべて削除されます。')) return;
    try {
        await db.collection('members').doc(currentMemberId).delete();
        const snap = await db.collection('member_stocks').where('memberId', '==', currentMemberId).get();
        const batch = db.batch();
        snap.forEach(d => batch.delete(d.ref));
        await batch.commit();
        closeDeleteAccountModal();
        alert('アカウントを削除しました');
        logout();
    } catch (e) { alert('削除に失敗しました\n' + e.message); }
}

// ========================================
// ログアウト・その他
// ========================================
function logout() {
    currentMemberId = null; currentMemberName = null;
    currentReeds = {}; selectedInstrument = null;
    selectedMaker = null; selectedColor = null; selectedStrength = null;
    showScreen('instrument');
}

function showSuccessModal(msg) {
    document.getElementById('successMessage').textContent = msg;
    document.getElementById('successModal').classList.add('show');
}
function closeModal() { document.getElementById('successModal').classList.remove('show'); }
